<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Homestead CRM" />
    <meta name="theme-color" content="#1A1A1A" />
    <link rel="manifest" href="/manifest.json" />
    <title>Homestead CRM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- OneSignal -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];

      function showBannerIfNeeded() {
        // Notifications paused for now — banner stays hidden
        return;
      }

      // Must be global so the button handler can reach it
      window.enablePush = function() {
        // iOS requires the permission call to happen synchronously inside the tap.
        // OneSignal v16 exposes Notifications on the global once initialized.
        try {
          if (window.OneSignal && window.OneSignal.Notifications && window.OneSignal.Notifications.requestPermission) {
            window.OneSignal.Notifications.requestPermission();
            setTimeout(function(){ var b=document.getElementById('notif-banner'); if(b) b.style.display='none'; }, 500);
          } else {
            window.OneSignalDeferred.push(function(OneSignal) {
              OneSignal.Notifications.requestPermission();
              var b=document.getElementById('notif-banner'); if(b) b.style.display='none';
            });
          }
        } catch(e) {
          alert('Could not enable notifications: ' + (e && e.message ? e.message : e));
        }
      };

      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "f4317bd8-66ea-4490-8352-4a313ca68f03",
          notifyButton: { enable: false },
          allowLocalhostAsSecureOrigin: true,
          serviceWorkerParam: { scope: "/" },
          serviceWorkerPath: "OneSignalSDKWorker.js",
        });
        showBannerIfNeeded();
      });

      // Fallback: check permission state directly after load, in case init callback is slow on iOS
      window.addEventListener('load', function() {
        setTimeout(showBannerIfNeeded, 2500);
      });
    </script>

    <style>
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

      html, body {
        height: 100%;
        background: #1A1A1A;
        overscroll-behavior: none;
      }

      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }

      #root {
        width: 100%;
        height: 100%;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }

      @supports (-webkit-touch-callout: none) {
        body { height: -webkit-fill-available; }
      }

      #notif-banner {
        display: none;
        position: fixed;
        top: env(safe-area-inset-top);
        left: 50%;
        transform: translateX(-50%);
        width: 100%;
        max-width: 480px;
        z-index: 9999;
        background: #1A2A1A;
        border-bottom: 1px solid #3A8A56;
        padding: 10px 18px;
        align-items: center;
        justify-content: space-between;
        font-family: 'Inter', system-ui, sans-serif;
      }

      #notif-banner span {
        font-size: 12px;
        color: #90D5A0;
        font-weight: 600;
      }

      #notif-banner button {
        background: #2E6644;
        color: #fff;
        border: none;
        border-radius: 6px;
        padding: 6px 14px;
        font-size: 12px;
        font-weight: 800;
        cursor: pointer;
        font-family: 'Inter', system-ui, sans-serif;
        margin-left: 12px;
        white-space: nowrap;
        -webkit-tap-highlight-color: transparent;
      }
    </style>
  </head>
  <body>
    <div id="notif-banner" style="display:none !important;">
      <span>🔔 Enable notifications for follow-up reminders</span>
      <button id="enable-push-btn">Turn On</button>
    </div>
    <div id="root"></div>
    <script>
      (function() {
        var btn = document.getElementById('enable-push-btn');
        if (btn) {
          var handler = function(e) {
            e.preventDefault();
            e.stopPropagation();
            if (window.enablePush) window.enablePush();
          };
          btn.addEventListener('click', handler);
          btn.addEventListener('touchend', handler);
        }
      })();
    </script>
  </body>
</html>
